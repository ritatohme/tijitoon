<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tijitoon — Série</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Rubik+Mono+One&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .topbar { position: sticky; top: 0; }
  .topbar-title { opacity: .4; font-size: clamp(.8rem,1.5vw,1.1rem); }

  /* ── HERO ── */
  .show-hero { border-bottom: 4px solid var(--ink); }
  .show-hero-inner {
    padding: 4rem 5vw 3rem;
    position: relative;
    max-width: 1200px;
    margin: 0 auto;
  }
  .show-eyebrow {
    font-family: 'VT323', monospace; font-size: clamp(1rem,2vw,1.3rem);
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.2rem; flex-wrap: wrap;
  }
  .show-tag {
    font-family: 'VT323', monospace; font-size: clamp(.85rem,1.5vw,1rem);
    padding: .2rem .8rem; border: 2px solid var(--ink);
  }
  .tag-ANIME { background: var(--hot); color: var(--paper); }
  .tag-FR    { background: var(--orange); }
  .tag-TOON  { background: var(--lime); }
  .tag-KIDS  { background: var(--sky); }
  .tag-default { background: var(--lime); }
  .show-years { font-family: 'VT323', monospace; font-size: 1.3rem; opacity: .6; }
  .ch-badge {
    font-family: 'Bungee', sans-serif; font-size: .8rem;
    padding: .3rem .9rem; border: 2px solid var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .ch-badge.teletoon { background: var(--hot); color: var(--paper); }
  .ch-badge.tiji     { background: var(--sky); color: var(--ink); }

  h1.show-title {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(2rem,7vw,5.5rem);
    line-height: .95; letter-spacing: -.02em;
    text-shadow: 3px 3px 0 var(--hot), 6px 6px 0 var(--sky);
    max-width: 800px;
    margin-bottom: .5rem;
    word-break: break-word;
  }

  /* ── EPISODE NAV ── */
  .ep-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1.2rem;
  }
  .ep-nav-btn {
    font-family: 'Bungee', sans-serif; font-size: clamp(.7rem,1.5vw,.85rem);
    padding: .6rem 1.2rem;
    color: var(--ink);
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    cursor: pointer;
    white-space: nowrap; letter-spacing: .03em;
    transition: background .1s, color .1s;
  }
  #btn-prev:not(:disabled) { background: var(--lime); }
  #btn-next:not(:disabled) { background: var(--hot); color: var(--paper); }
  .ep-nav-btn:hover:not(:disabled) { filter: brightness(1.1); }
  .ep-nav-btn:disabled {
    background: var(--paper); color: rgba(19,17,26,.25);
    box-shadow: none; cursor: default;
  }
  .ep-nav-counter {
    font-family: 'VT323', monospace; font-size: 1.2rem;
    opacity: .5; text-align: center;
    white-space: nowrap;
  }

  /* ── MAIN LAYOUT ── */
  .show-body {
    padding: 3rem 5vw 5rem;
    display: grid;
    grid-template-columns: minmax(0,1fr) min(340px, 35%);
    gap: 2.5rem;
    align-items: start;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── VIDEO PLAYER ── */
  .player-wrap {
    border: 3px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    background: #111;
    aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .player-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    color: rgba(255,246,227,.3);
    font-family: 'VT323', monospace; font-size: 1.3rem;
    text-align: center; padding: 2rem;
  }
  .player-source {
    font-family: 'VT323', monospace; font-size: 1rem;
    margin-top: 1rem; opacity: .5;
  }
  .player-external-link {
    margin-top: .5rem; padding: .5rem 1.5rem;
    background: rgba(255,246,227,.15);
    border: 1px solid rgba(255,246,227,.3);
    color: rgba(255,246,227,.8);
    font-family: 'VT323', monospace; font-size: 1.2rem;
    text-decoration: none; border-radius: 4px;
  }
  .player-external-link:hover { background: rgba(255,246,227,.25); }
  #player-iframe { width: 100%; height: 100%; border: none; display: none; }

  /* ── SIDEBAR ── */
  .season-list { border: 3px solid var(--ink); border-top: none; }
  .season-item {
    padding: .9rem 1rem; border-bottom: 2px solid var(--ink);
    cursor: pointer; font-family: 'Space Mono', monospace; font-size: .85rem;
    transition: background .1s; display: flex; align-items: center; justify-content: space-between;
    gap: .5rem;
  }
  .season-item:last-child { border-bottom: none; }
  .season-item:hover  { background: var(--cream); }
  .season-item.active { background: var(--lime); }
  .season-item .s-label { font-weight: 700; }
  .season-item .s-count { font-family: 'VT323', monospace; font-size: 1rem; opacity: .5; white-space: nowrap; flex-shrink: 0; }

  /* Episode list */
  .ep-list {
    border: 3px solid var(--ink); border-top: none;
    max-height: 420px; overflow-y: auto;
  }
  .ep-item {
    padding: .7rem 1rem; border-bottom: 1px solid rgba(19,17,26,.12);
    cursor: pointer; font-family: 'Space Mono', monospace; font-size: clamp(.7rem,1.2vw,.8rem);
    display: flex; align-items: center; gap: .8rem;
    transition: background .1s;
  }
  .ep-item:last-child { border-bottom: none; }
  .ep-item:hover   { background: var(--cream); }
  .ep-item.playing { background: var(--lime); }
  .ep-item .ep-num {
    font-family: 'VT323', monospace; font-size: 1.1rem;
    color: var(--ink); opacity: .4; flex-shrink: 0; width: 2.5rem;
  }
  .ep-item.playing .ep-num { opacity: 1; color: var(--hot); }
  .ep-item .ep-title { flex: 1; line-height: 1.3; }
  .ep-item .ep-play { flex-shrink: 0; font-size: .7rem; opacity: 0; transition: opacity .1s; }
  .ep-item:hover .ep-play   { opacity: .5; }
  .ep-item.playing .ep-play { opacity: 1; color: var(--hot); }

  .ep-list::-webkit-scrollbar       { width: 6px; }
  .ep-list::-webkit-scrollbar-track { background: var(--paper); }
  .ep-list::-webkit-scrollbar-thumb { background: var(--ink); border-radius: 0; }

  /* details/summary collapse */
  details.sidebar-section { border: 3px solid var(--ink); border-top: none; }
  details.sidebar-section summary {
    font-family: 'Bungee', sans-serif; font-size: clamp(.9rem,1.8vw,1.2rem);
    background: var(--ink); color: var(--paper);
    padding: .6rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: .5rem; list-style: none; cursor: pointer;
    white-space: nowrap;
  }
  details.sidebar-section summary::-webkit-details-marker { display: none; }
  details.sidebar-section summary .s-label { font-family: 'VT323', monospace; font-size: 1.1rem; opacity: .5; font-weight: 400; }
  details.sidebar-section summary::after { content: '›'; padding-left: .5rem; transition: transform .2s; display: inline-block; }
  details.sidebar-section[open] summary::after { transform: rotate(90deg); }

  @media (max-width: 900px) {
    .show-body { grid-template-columns: 1fr; }
    .sidebar   { order: -1; }
    .ep-list   { max-height: 280px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" id="back-btn" href="index.html">← CATALOGUE</a>
  <span class="topbar-title" id="topbar-title"></span>
</div>

<div class="show-hero">
  <div class="show-hero-inner">
    <div class="show-eyebrow">
      <span class="show-tag" id="show-tag">TOON</span>
      <span class="show-years" id="show-years">2000–2015</span>
      <span class="ch-badge" id="show-channel">Télétoon</span>
    </div>
    <h1 class="show-title" id="show-title">SÉRIE</h1>
  </div>
</div>

<div class="show-body">

  <!-- Player -->
  <div>
    <div class="player-wrap" id="player-wrap">
      <iframe id="player-iframe" allowfullscreen webkitallowfullscreen mozallowfullscreen allow="autoplay; fullscreen; picture-in-picture; web-share"></iframe>
      <video id="player-video" controls controlslist="nodownload" style="display:none;width:100%;height:100%;"></video>
      <div class="player-placeholder" id="player-placeholder">
        <div>Sélectionne un épisode<br>pour lancer la lecture</div>
      </div>
    </div>
    <div class="ep-nav" id="ep-nav">
      <button class="ep-nav-btn" id="btn-prev" disabled onclick="navigateEp(-1)">← ÉP. PRÉC.</button>
      <span class="ep-nav-counter" id="ep-nav-counter">— / —</span>
      <button class="ep-nav-btn" id="btn-next" disabled onclick="navigateEp(1)">ÉP. SUIV. →</button>
    </div>
    <div class="player-source" id="player-source"></div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar"></div>

</div>

<script>
  const params = new URLSearchParams(location.search);
  const showId = params.get('id');
  if (!showId || !/^[\w-]+$/.test(showId)) window.location.replace('404.html');

  const sidebar      = document.getElementById('sidebar');
  const iframe       = document.getElementById('player-iframe');
  const video        = document.getElementById('player-video');
  const placeholder  = document.getElementById('player-placeholder');
  const playerSource = document.getElementById('player-source');

  const MOBILE_QUERY = window.matchMedia('(max-width: 900px)');

  // Sandbox permissions per hostname — everything is sandboxed, unknown hosts get minimal perms
  const SANDBOX_PERMISSIONS = {
    'ojamajo.moe': 'allow-same-origin allow-scripts allow-popups allow-forms',
  };

  // Per-episode type detection — falls back to URL sniffing if no explicit type field
  function getEpType(ep) {
    if (ep.type) return ep.type;
    if (ep.url?.includes('ojamajo.moe/videos/watch')) return 'redirect';
    if (ep.url?.endsWith('.mp4') && !ep.url.includes('archive.org')) return 'mp4';
    return 'embed';
  }

  const btnPrev      = document.getElementById('btn-prev');
  const btnNext      = document.getElementById('btn-next');
  const epNavCounter = document.getElementById('ep-nav-counter');

  let show          = null;
  let currentSeason = 0;
  let currentEp     = -1;
  let currentPos    = -1;

  // State refs for in-place updates (set during buildSidebar, used by selectSeason/selectEp)
  let seasonItems       = [];
  let epLists           = [];
  let epSummaries       = [];
  let seasonsDet        = null;
  let flatEps           = [];
  let updateSeasonsLabel = () => {};

  fetch('data.json')
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      show = data[showId];
      if (!show) return window.location.replace('404.html');
      flatEps = show.seasons.flatMap((s, si) =>
        s.episodes.map((ep, ei) => ({ seasonIdx: si, epIdx: ei, ep }))
      );
      populateHero();
      buildSidebar();
      selectEp(0, 0, show.seasons[0].episodes[0], epLists[0].det);
    })
    .catch(() => window.location.replace('404.html'));

  function populateHero() {
    document.title = `Tijitoon — ${show.title}`;
    document.getElementById('show-title').textContent = show.title.toUpperCase();
    document.getElementById('show-years').textContent = show.years || '';
    document.getElementById('topbar-title').textContent = show.title.toUpperCase();

    const tagEl = document.getElementById('show-tag');
    tagEl.textContent = show.tag;
    tagEl.className = 'show-tag tag-' + (show.tag || 'default');

    const chEl = document.getElementById('show-channel');
    if (show.channel === 'tiji') {
      chEl.textContent = 'Tiji';
      chEl.classList.add('tiji');
    } else {
      chEl.textContent = 'Télétoon';
      chEl.classList.add('teletoon');
    }
  }

  // Built once — season clicks/episode clicks only toggle classes and swap visibility
  function buildSidebar() {
    sidebar.innerHTML = '';
    seasonItems  = [];
    epLists      = [];
    epSummaries  = [];
    seasonsDet   = null;

    const seasons     = show.seasons;
    const multiSeason = seasons.length > 1;
    const isMobile    = MOBILE_QUERY.matches;

    if (multiSeason) {
      const det = document.createElement('details');
      det.className = 'sidebar-section';
      if (!isMobile) det.open = true;
      seasonsDet = det;

      const sum = document.createElement('summary');
      const label = document.createElement('span');
      label.className = 's-label';
      sum.append('SAISONS ', label);
      det.appendChild(sum);

      updateSeasonsLabel = () => {
        if (det.open) {
          label.textContent = `${seasons.length} saisons`;
        } else {
          const s = seasons[currentSeason];
          label.textContent = `S${String(currentSeason + 1).padStart(2,'0')} · ${s.name}`;
        }
      };
      updateSeasonsLabel();
      det.addEventListener('toggle', updateSeasonsLabel);

      const sl = document.createElement('div');
      sl.className = 'season-list';
      seasons.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'season-item' + (i === currentSeason ? ' active' : '');
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');

        const sLabel = document.createElement('span');
        sLabel.className = 's-label';
        sLabel.textContent = s.name;
        const sCount = document.createElement('span');
        sCount.className = 's-count';
        sCount.textContent = `${s.episodes.length} ép.`;
        item.append(sLabel, sCount);

        item.addEventListener('click', () => selectSeason(i));
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectSeason(i); }
        });
        sl.appendChild(item);
        seasonItems.push(item);
      });
      det.appendChild(sl);
      sidebar.appendChild(det);
    }

    seasons.forEach((season, si) => {
      const epDet = document.createElement('details');
      epDet.className = 'sidebar-section';
      epDet.style.display = si === currentSeason ? '' : 'none';
      if (!isMobile) epDet.open = true;

      const epSum = document.createElement('summary');
      const epLabel = document.createElement('span');
      epLabel.className = 's-label';
      epSum.append('ÉPISODES ', epLabel);
      epDet.appendChild(epSum);

      const updateEpLabel = () => {
        if (epDet.open || currentEp === -1 || currentSeason !== si) {
          epLabel.textContent = `${season.episodes.length} ép.`;
        } else {
          const ep = season.episodes[currentEp];
          epLabel.textContent = `S${si + 1} E${String(ep.num).padStart(2, '0')}`;
        }
      };
      updateEpLabel();
      epDet.addEventListener('toggle', updateEpLabel);
      epSummaries.push({ el: epSum, label: epLabel, update: updateEpLabel });

      const el = document.createElement('div');
      el.className = 'ep-list';
      season.episodes.forEach((ep, i) => {
        const item = document.createElement('div');
        item.className = 'ep-item' + (si === currentSeason && i === currentEp ? ' playing' : '');
        item.setAttribute('role', 'button');
        item.setAttribute('tabindex', '0');

        const num = document.createElement('span');
        num.className = 'ep-num';
        num.textContent = `E${String(ep.num).padStart(2, '0')}`;
        const title = document.createElement('span');
        title.className = 'ep-title';
        title.textContent = ep.title;
        const play = document.createElement('span');
        play.className = 'ep-play';
        play.textContent = '▶';
        item.append(num, title, play);

        item.addEventListener('click', () => selectEp(si, i, ep, epDet));
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectEp(si, i, ep, epDet); }
        });
        el.appendChild(item);
      });
      epDet.appendChild(el);
      sidebar.appendChild(epDet);
      epLists.push({ det: epDet, el });
    });

    updateEpNav();

    // Resize: re-open/close details when crossing the breakpoint
    MOBILE_QUERY.addEventListener('change', e => {
      sidebar.querySelectorAll('details.sidebar-section').forEach(det => {
        det.open = !e.matches;
      });
    });
  }

  function switchSeason(i) {
    currentSeason = i;
    seasonItems.forEach((item, j) => item.classList.toggle('active', j === i));
    epLists.forEach(({ det, el }, j) => {
      det.style.display = j === i ? '' : 'none';
      el.querySelectorAll('.ep-item').forEach(item => item.classList.remove('playing'));
    });
    updateSeasonsLabel();
    epSummaries.forEach(({ update }) => update());
  }

  function selectSeason(i) {
    if (i === currentSeason) {
      if (seasonsDet) seasonsDet.open = false;
      return;
    }
    currentEp = -1;
    switchSeason(i);
    if (seasonsDet) seasonsDet.open = false;
    selectEp(i, 0, show.seasons[i].episodes[0], epLists[i].det);
    if (!MOBILE_QUERY.matches) epLists[i].det.open = true;
  }

  function selectEp(seasonIdx, epIdx, ep, epDet) {
    if (seasonIdx !== currentSeason) switchSeason(seasonIdx);
    currentEp = epIdx;
    currentPos = flatEps.findIndex(e => e.seasonIdx === seasonIdx && e.epIdx === epIdx);

    const { el, det } = epLists[seasonIdx];
    el.querySelectorAll('.ep-item').forEach((item, j) =>
      item.classList.toggle('playing', j === epIdx)
    );
    epSummaries[seasonIdx].update();

    loadEpisode(ep);
    updateEpNav();
    if (MOBILE_QUERY.matches) det.open = false;
    if (seasonsDet && seasonsDet !== epDet) seasonsDet.open = false;
  }

  function updateEpNav() {
    const total = flatEps.length;
    epNavCounter.textContent = currentPos === -1
      ? `— / ${total}`
      : `E${String(currentPos + 1).padStart(2,'0')} / ${total}`;
    btnPrev.disabled = currentPos <= 0;
    btnNext.disabled = currentPos === -1 || currentPos >= total - 1;
  }

  function navigateEp(dir) {
    if (currentPos === -1) return;
    const next = flatEps[currentPos + dir];
    if (!next) return;
    selectEp(next.seasonIdx, next.epIdx, next.ep, epLists[next.seasonIdx].det);
  }

  function loadEpisode(ep) {
    if (!ep.url) {
      showNoVideo(ep);
      return;
    }

    const type = getEpType(ep);

    iframe.style.display = 'none';
    iframe.src = '';
    video.style.display = 'none';
    video.src = '';
    placeholder.style.display = 'none';
    placeholder.textContent = '';

    if (type === 'redirect') {
      const epLabel = document.createElement('div');
      epLabel.textContent = `Saison ${currentSeason + 1} — Épisode ${ep.num}`;
      const link = document.createElement('a');
      link.className = 'player-external-link';
      link.href = ep.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      link.textContent = '▶ Regarder sur ojamajo.moe';
      placeholder.append(epLabel, link);
      placeholder.style.display = 'flex';
      playerSource.textContent = 'ojamajo.moe';
    } else if (type === 'mp4') {
      video.src = ep.url;
      video.style.display = 'block';
      playerSource.textContent = new URL(ep.url).hostname;
    } else {
      const host = new URL(ep.url).hostname;
      const perms = SANDBOX_PERMISSIONS[host] ?? 'allow-scripts allow-same-origin';
      iframe.setAttribute('sandbox', perms);
      iframe.src = ep.url;
      iframe.style.display = 'block';
      playerSource.textContent = host;
    }
  }

  function showNoVideo(ep) {
    iframe.style.display = 'none';
    iframe.src = '';
    video.style.display = 'none';
    video.src = '';
    placeholder.textContent = '';
    const epLabel = document.createElement('div');
    epLabel.textContent = `Saison ${currentSeason + 1} — Épisode ${ep.num}`;
    const unavail = document.createElement('div');
    unavail.style.cssText = 'font-size:1rem;opacity:.3';
    unavail.textContent = 'Vidéo non disponible pour l\'instant';
    placeholder.append(epLabel, unavail);
    placeholder.style.display = 'flex';
    playerSource.textContent = '';
  }
</script>

</body>
</html>
